<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#ffd7e6" />
<title>Happy Birthday Yimei</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Pacifico&display=swap" rel="stylesheet">
<style>
  :root{
    --blush:#ffe5ec; --bubble:#ffc2d1; --rose:#ff8fab; --rose-deep:#ff5d8f;
    --lav:#c8b6ff; --lav-soft:#e6dbff; --cream:#fffaf7; --ink:#7a5b6b;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;margin:0;overflow:hidden;}
  body{
    font-family:'Fredoka',system-ui,sans-serif;
    background:radial-gradient(120% 90% at 50% 8%, #fff2f7 0%, var(--blush) 38%, var(--lav-soft) 100%);
    color:var(--ink);display:flex;align-items:center;justify-content:center;
    position:relative;touch-action:manipulation;user-select:none;
  }
  .scene{
    font-size:clamp(3px, 0.92vmin, 5px);
    position:relative;width:80em;height:96em;
    display:flex;align-items:center;justify-content:center;z-index:2;
  }

  /* ambient floaty hearts */
  .sky{position:fixed;inset:0;overflow:hidden;z-index:1;pointer-events:none;}
  .floaty{position:absolute;bottom:-6vh;color:var(--rose);opacity:0;
    animation:rise linear forwards;will-change:transform,opacity;
    filter:drop-shadow(0 2px 2px rgba(255,120,160,.25));}
  @keyframes rise{
    0%{transform:translateY(0) scale(.4) rotate(0);opacity:0;}
    12%{opacity:.85;} 88%{opacity:.7;}
    100%{transform:translateY(-118vh) scale(1) rotate(var(--spin));opacity:0;}}

  /* ---------- card ---------- */
  .card{position:absolute;left:50%;top:58em;transform:translateX(-50%);
    width:52em;height:34em;z-index:3;}
  .card-inner{position:absolute;inset:0;border-radius:5em;
    background:linear-gradient(160deg,#fffdfd,#fff0f5);
    box-shadow:inset 0 0 0 1.4em #ffe0ea, 0 10em 18em -8em rgba(255,93,143,.45);
    display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .card-inner .inner-heart{font-size:18em;color:var(--rose);opacity:0;transform:scale(.3);
    filter:drop-shadow(0 3px 0 rgba(255,93,143,.35));}
  .opened .card-inner .inner-heart{animation:pop-heart 1.1s .15s cubic-bezier(.2,1.4,.4,1) forwards, thump 1.4s 1.1s ease-in-out infinite;}
  @keyframes pop-heart{to{opacity:1;transform:scale(1);}}
  @keyframes thump{0%,100%{transform:scale(1);}50%{transform:scale(1.12);}}

  .face{position:absolute;top:0;height:100%;width:50%;
    background:linear-gradient(150deg,var(--rose) 0%,var(--rose-deep) 100%);
    overflow:hidden;transition:transform 1s cubic-bezier(.55,.06,.2,1.2), opacity 1s ease;
    will-change:transform;z-index:4;}
  .face::after{content:"";position:absolute;inset:0;
    background-image:radial-gradient(rgba(255,255,255,.5) 1.4em, transparent 1.5em);
    background-size:9em 9em;opacity:.5;}
  .face-left{left:0;border-radius:5em 0 0 5em;
    clip-path:polygon(0 0, 96% 0, 100% 6%, 94% 13%, 100% 20%, 93% 27%, 100% 34%, 94% 41%, 100% 48%, 93% 55%, 100% 62%, 94% 69%, 100% 76%, 93% 83%, 100% 90%, 95% 97%, 97% 100%, 0 100%);
    box-shadow:inset -1em 0 3em rgba(150,0,50,.18);}
  .face-right{right:0;border-radius:0 5em 5em 0;
    clip-path:polygon(4% 0, 100% 0, 100% 100%, 3% 100%, 5% 97%, 7% 90%, 0 83%, 7% 76%, 0 69%, 6% 62%, 0 55%, 7% 48%, 0 41%, 6% 34%, 0 27%, 7% 20%, 0 13%, 6% 6%);
    box-shadow:inset 1em 0 3em rgba(150,0,50,.18);}
  .seal{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    font-size:13em;color:#fff;z-index:6;filter:drop-shadow(0 3px 0 rgba(200,0,60,.35));
    transition:transform .35s ease, opacity .3s ease;}
  .grabbing .seal{animation:seal-shake .28s ease-in-out 2;}
  @keyframes seal-shake{25%{transform:translate(-56%,-50%) rotate(-8deg);}75%{transform:translate(-44%,-50%) rotate(8deg);}}
  .opened .seal{opacity:0;transform:translate(-50%,-160%) scale(.4);}
  .opened .face-left{transform:translateX(-118%) rotate(-16deg);opacity:.96;}
  .opened .face-right{transform:translateX(118%) rotate(16deg);opacity:.96;}

  /* ---------- maltipoos ---------- */
  .dog{position:absolute;width:22em;height:26em;margin-left:-11em;z-index:7;
    opacity:0;transform:translateY(-140%) scale(.5);
    transition:transform .7s cubic-bezier(.2,1.5,.4,1), opacity .5s ease;}
  .dog svg{width:100%;height:100%;display:block;overflow:visible;}
  .in .dog{opacity:1;transform:none;}
  .d-lout{left:15em;top:47em;transition-delay:.02s;}
  .d-lin {left:29em;top:45em;transition-delay:.10s;}
  .d-rin {left:51em;top:45em;transition-delay:.16s;}
  .d-rout{left:65em;top:47em;transition-delay:.24s;}

  .grabbing .d-lout{transform:translateX(3em) rotate(8deg);}
  .grabbing .d-lin {transform:translateX(2em) rotate(6deg);}
  .grabbing .d-rin {transform:translateX(-2em) rotate(-6deg);}
  .grabbing .d-rout{transform:translateX(-3em) rotate(-8deg);}

  .opened .d-lout{transform:translateX(-9em) translateY(-3em) rotate(-12deg);}
  .opened .d-lin {transform:translateX(-4em) translateY(-4em) rotate(-6deg);}
  .opened .d-rin {transform:translateX(4em)  translateY(-4em) rotate(6deg);}
  .opened .d-rout{transform:translateX(9em)  translateY(-3em) rotate(12deg);}

  .dog-inner{transform-origin:50% 80%;animation:idle 2.6s ease-in-out infinite;}
  .d-lin .dog-inner{animation-delay:.3s;} .d-rin .dog-inner{animation-delay:.6s;} .d-rout .dog-inner{animation-delay:.9s;}
  @keyframes idle{0%,100%{transform:translateY(0) rotate(0);}50%{transform:translateY(-.5em) rotate(-1.2deg);}}
  .opened .dog-inner{animation:cheerd 1s ease-in-out infinite;}
  @keyframes cheerd{0%,100%{transform:translateY(0) scale(1) rotate(0);}50%{transform:translateY(-2.2em) scale(1.05) rotate(0);}}

  .meimei{--fur:#f4e7cc;--ear:#e9d8b0;--muzzle:#fdf6e6;--spot:transparent;}
  .lucy  {--fur:#ecd6a3;--ear:#dec489;--muzzle:#f8ecca;--spot:transparent;}
  .coco  {--fur:#8a5a3a;--ear:#6f4527;--muzzle:#c9a583;--spot:transparent;}
  .lucky {--fur:#fbf8f4;--ear:#efe7dd;--muzzle:#ffffff;--spot:#9c6b46;}

  .tag{position:absolute;left:50%;bottom:1.4em;transform:translateX(-50%);
    font-size:3.4em;font-weight:600;color:var(--rose-deep);opacity:0;white-space:nowrap;
    text-shadow:0 1px 0 #fff;}
  .opened .tag{animation:tag-in .5s 1.4s ease forwards;}
  @keyframes tag-in{to{opacity:.9;}}

  /* ---------- burst ---------- */
  .burst{position:absolute;left:50%;top:64em;width:0;height:0;z-index:6;pointer-events:none;}
  .spark{position:absolute;left:0;top:0;font-size:var(--sz,8em);opacity:0;will-change:transform,opacity;}
  .go .spark{animation:burst-out var(--dur,1.6s) var(--dly,0s) cubic-bezier(.15,.7,.3,1) forwards;}
  @keyframes burst-out{
    0%{opacity:0;transform:translate(-50%,-50%) scale(.2);}
    18%{opacity:1;}
    100%{opacity:0;transform:translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(var(--end,1)) rotate(var(--rot,0deg));}}

  /* ---------- message ---------- */
  .message{position:absolute;left:50%;top:4em;transform:translateX(-50%);
    width:78em;text-align:center;z-index:8;pointer-events:none;overflow:visible;}
  .hb{display:block;font-weight:600;font-size:9.5em;line-height:1.05;
    color:#ff6fa0;letter-spacing:.02em;
    text-shadow:0 .06em 0 #fff, 0 .16em 0 rgba(255,143,171,.5);
    opacity:0;transform:translateY(1.2em) scale(.8);}
  .name-wrap{position:relative;display:inline-block;font-size:22em;}
  .name{position:relative;display:inline-block;
    font-family:'Pacifico',cursive;font-size:1em;line-height:1.25;
    padding:.14em .5em .34em;
    background:linear-gradient(180deg,#ff8fab,#ff4f87 70%,#e83e77);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 .04em 0 #fff) drop-shadow(0 .1em .12em rgba(255,79,135,.35));
    opacity:0;transform:translateY(.6em) scale(.6);}
  .opened .hb{animation:hb-in .7s 1.1s cubic-bezier(.2,1.5,.35,1) forwards;}
  .opened .name{animation:name-in .9s 1.35s cubic-bezier(.2,1.7,.35,1) forwards, sway 3.6s 2.3s ease-in-out infinite;}
  @keyframes hb-in{to{opacity:1;transform:translateY(0) scale(1);}}
  @keyframes name-in{to{opacity:1;transform:translateY(0) scale(1);}}
  @keyframes sway{0%,100%{transform:translateY(0) rotate(-1.5deg);}50%{transform:translateY(-.6em) rotate(1.5deg);}}

  /* heart tittles over the two i's */
  .tittle{position:absolute;font-size:.3em;top:-2%;transform:translateX(-50%) rotate(-8deg);
    color:#ff3d7a;opacity:0;text-shadow:0 .03em 0 rgba(255,255,255,.95);z-index:2;}
  .opened .tittle{animation:tittle-in .5s 1.9s cubic-bezier(.2,1.8,.35,1) forwards, tittle-bob 2s 2.4s ease-in-out infinite;}
  @keyframes tittle-in{from{opacity:0;transform:translateX(-50%) scale(.2) rotate(-8deg);}to{opacity:1;transform:translateX(-50%) scale(1) rotate(-8deg);}}
  @keyframes tittle-bob{0%,100%{transform:translateX(-50%) scale(1) rotate(-8deg);}50%{transform:translateX(-50%) scale(1.12) rotate(6deg);}}
  .t1{left:37.9%;} .t2{left:81.4%;}

  .tiny{position:absolute;font-size:8em;color:var(--rose);opacity:0;}
  .opened .tiny{animation:twinkle 1.8s ease-in-out infinite;}
  .tiny.a{left:0;top:-2em;animation-delay:1.7s;} .tiny.b{right:0;top:-3em;animation-delay:2s;}
  @keyframes twinkle{0%,100%{opacity:0;transform:scale(.5);}50%{opacity:.9;transform:scale(1) rotate(10deg);}}

  .hint{position:fixed;left:0;right:0;bottom:5.5vh;text-align:center;
    font-size:clamp(13px,3.6vw,17px);color:#c98aa4;font-weight:500;
    opacity:0;transition:opacity .6s ease;z-index:9;pointer-events:none;letter-spacing:.02em;}
  .hint.show{opacity:1;animation:hint-bob 2.4s ease-in-out infinite;}
  @keyframes hint-bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-4px);}}

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.001ms !important;animation-iteration-count:1 !important;transition-duration:.001ms !important;}
    .floaty{display:none;}
  }
</style>
</head>
<body>
  <div class="sky" id="sky"></div>

  <!-- reusable maltipoo -->
  <svg style="position:absolute;width:0;height:0" aria-hidden="true">
    <symbol id="pup" viewBox="0 0 100 112">
      <ellipse cx="17" cy="48" rx="12" ry="21" fill="var(--ear)" transform="rotate(-16 17 48)"/>
      <ellipse cx="83" cy="48" rx="12" ry="21" fill="var(--ear)" transform="rotate(16 83 48)"/>
      <g fill="var(--fur)">
        <circle cx="50" cy="47" r="30"/>
        <circle cx="27" cy="31" r="12"/><circle cx="43" cy="21" r="12"/>
        <circle cx="57" cy="21" r="12"/><circle cx="73" cy="31" r="12"/>
        <circle cx="82" cy="49" r="12"/><circle cx="73" cy="66" r="12"/>
        <circle cx="57" cy="75" r="12"/><circle cx="43" cy="75" r="12"/>
        <circle cx="27" cy="66" r="12"/><circle cx="18" cy="49" r="12"/>
        <circle cx="50" cy="15" r="8"/>
      </g>
      <g fill="var(--spot)">
        <circle cx="30" cy="30" r="14"/><circle cx="72" cy="63" r="10"/>
      </g>
      <ellipse cx="50" cy="59" rx="16" ry="13" fill="var(--muzzle)"/>
      <ellipse cx="31" cy="58" rx="5" ry="3.2" fill="#ff9bb3" opacity=".6"/>
      <ellipse cx="69" cy="58" rx="5" ry="3.2" fill="#ff9bb3" opacity=".6"/>
      <circle cx="39" cy="50" r="5" fill="#33231e"/><circle cx="61" cy="50" r="5" fill="#33231e"/>
      <circle cx="40.6" cy="48.3" r="1.6" fill="#fff"/><circle cx="62.6" cy="48.3" r="1.6" fill="#fff"/>
      <ellipse cx="50" cy="57" rx="5" ry="3.8" fill="#33231e"/>
      <path d="M50 61 Q45 67 40.5 63 M50 61 Q55 67 59.5 63" stroke="#33231e" stroke-width="1.6" fill="none" stroke-linecap="round"/>
      <ellipse cx="36" cy="99" rx="9" ry="7" fill="var(--fur)"/>
      <ellipse cx="64" cy="99" rx="9" ry="7" fill="var(--fur)"/>
      <path d="M50 13 L40 7 L40 19 Z" fill="#ff8fab"/>
      <path d="M50 13 L60 7 L60 19 Z" fill="#ff8fab"/>
      <circle cx="50" cy="13" r="3.2" fill="#ff5d8f"/>
    </symbol>
  </svg>

  <div class="scene" id="scene">

    <div class="message">
      <span class="hb">Happy Birthday</span>
      <span class="name-wrap"><span class="name">Yimei</span><span class="tittle t1">♥</span><span class="tittle t2">♥</span></span>
      <span class="tiny a">💗</span><span class="tiny b">💕</span>
    </div>

    <div class="card" id="card">
      <div class="card-inner"><div class="inner-heart">♥</div></div>
      <div class="face face-left"></div>
      <div class="face face-right"></div>
      <div class="seal">♥</div>
    </div>

    <div class="burst" id="burst"></div>

    <div class="dog meimei d-lout"><div class="dog-inner"><svg viewBox="0 0 100 112"><use href="#pup"/></svg><div class="tag">Meimei</div></div></div>
    <div class="dog coco d-lin"><div class="dog-inner"><svg viewBox="0 0 100 112"><use href="#pup"/></svg><div class="tag">Coco</div></div></div>
    <div class="dog lucy d-rin"><div class="dog-inner"><svg viewBox="0 0 100 112"><use href="#pup"/></svg><div class="tag">Lucy</div></div></div>
    <div class="dog lucky d-rout"><div class="dog-inner"><svg viewBox="0 0 100 112"><use href="#pup"/></svg><div class="tag">Lucky</div></div></div>

  </div>

  <div class="hint" id="hint">tap anywhere to play again ✨</div>

<script>
(function(){
  const scene=document.getElementById('scene'), burst=document.getElementById('burst'),
        hint=document.getElementById('hint'), sky=document.getElementById('sky');
  const reduce=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const HEARTS=['💗','💕','💖','💓','💞','❤️','🩷'], SPARKS=['✨','⭐','🌸','💫'];
  let timers=[]; const clear=()=>{timers.forEach(clearTimeout);timers=[];};
  const at=(ms,fn)=>timers.push(setTimeout(fn,ms));

  function ambient(){
    if(reduce)return;
    const h=document.createElement('div'); h.className='floaty';
    h.textContent=HEARTS[Math.random()*HEARTS.length|0];
    h.style.left=Math.random()*100+'vw'; h.style.fontSize=(14+Math.random()*26)+'px';
    h.style.setProperty('--spin',(Math.random()*160-80)+'deg');
    const dur=7+Math.random()*6; h.style.animationDuration=dur+'s';
    h.style.opacity=.5+Math.random()*.4; sky.appendChild(h);
    setTimeout(()=>h.remove(),dur*1000+200);
  }
  setInterval(ambient,620); for(let i=0;i<6;i++) setTimeout(ambient,i*250);

  function makeBurst(){
    burst.innerHTML='';
    for(let i=0;i<24;i++){
      const s=document.createElement('div'); s.className='spark';
      const heart=Math.random()<.78;
      s.textContent=heart?HEARTS[Math.random()*HEARTS.length|0]:SPARKS[Math.random()*SPARKS.length|0];
      const ang=Math.PI*(0.06+Math.random()*0.88), dist=120+Math.random()*270;
      const dx=Math.cos(ang)*dist*(Math.random()<.5?-1:1), dy=-Math.sin(ang)*dist-40;
      s.style.setProperty('--dx',dx.toFixed(0)+'px'); s.style.setProperty('--dy',dy.toFixed(0)+'px');
      s.style.setProperty('--sz',(26+Math.random()*30)+'px'); s.style.setProperty('--dur',(1.3+Math.random()*1.1)+'s');
      s.style.setProperty('--dly',(Math.random()*0.25)+'s'); s.style.setProperty('--end',(0.7+Math.random()*0.7).toFixed(2));
      s.style.setProperty('--rot',(Math.random()*280-140)+'deg');
      burst.appendChild(s);
    }
    void burst.offsetWidth; burst.classList.add('go');
  }

  let audio;
  function chime(){
    try{
      audio=audio||new (window.AudioContext||window.webkitAudioContext)();
      if(audio.state==='suspended') audio.resume();
      const now=audio.currentTime;
      [0,4,7,12].forEach((semi,i)=>{
        const osc=audio.createOscillator(), g=audio.createGain();
        osc.type='sine'; osc.frequency.value=523.25*Math.pow(2,semi/12);
        const t=now+i*0.09;
        g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.14,t+0.02);
        g.gain.exponentialRampToValueAtTime(0.0001,t+0.5);
        osc.connect(g).connect(audio.destination); osc.start(t); osc.stop(t+0.55);
      });
    }catch(e){}
  }

  function play(withSound){
    clear();
    scene.classList.remove('in','grabbing','opened','go'); burst.classList.remove('go');
    hint.classList.remove('show'); void scene.offsetWidth;
    scene.classList.add('in');
    at(900, ()=>scene.classList.add('grabbing'));
    at(1650,()=>{scene.classList.remove('grabbing');scene.classList.add('opened','go');makeBurst();if(withSound)chime();});
    at(2100,()=>makeBurst());
    at(3600,()=>hint.classList.add('show'));
  }

  window.addEventListener('load',()=>play(false));
  document.body.addEventListener('click',()=>play(true));
  document.body.addEventListener('touchstart',()=>{},{passive:true});
})();
</script>
</body>
</html>
